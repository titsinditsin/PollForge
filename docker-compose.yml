version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pollforge_db
    environment:
      POSTGRES_DB: pollforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pollforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pollforge_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=pollforge;Username=postgres;Password=postgrespassword
      - Jwt__Key=PollForge-SuperSecret-JWT-Key-That-Is-At-Least-32-Chars!
      - Jwt__Issuer=PollForge
      - Jwt__Audience=PollForge
      - Jwt__ExpirationInMinutes=60
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
